version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: habit_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: habit_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data:
